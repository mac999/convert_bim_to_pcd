<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIM Point Cloud Viewer</title>
<style>
:root[data-theme="dark"]{
  --bg:#0d1117; --bg2:#161b22; --bg3:#1c2330; --border:#2a3240;
  --fg:#e6edf3; --fg2:#9aa7b4; --accent:#4da3ff; --accent2:#2f81f7;
  --canvas:#0a0e14; --hover:#233044; --active:#1f3a5f;
  --shadow:0 4px 16px rgba(0,0,0,.5);
}
:root[data-theme="light"]{
  --bg:#f5f7fa; --bg2:#ffffff; --bg3:#eef1f5; --border:#d7dde5;
  --fg:#1f2733; --fg2:#5b6773; --accent:#0969da; --accent2:#0550ae;
  --canvas:#e8ecf1; --hover:#e3ebf5; --active:#d3e3f8;
  --shadow:0 4px 16px rgba(0,0,0,.12);
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%; overflow:hidden}
body{
  font-family:'Segoe UI',system-ui,sans-serif; font-size:13px;
  background:var(--bg); color:var(--fg);
  display:grid; grid-template-rows:48px 1fr;
  grid-template-columns:270px 1fr 290px;
  grid-template-areas:"header header header" "sidebar canvas panel";
}
/* ---------- header ---------- */
header{
  grid-area:header; display:flex; align-items:center; gap:12px;
  padding:0 16px; background:var(--bg2); border-bottom:1px solid var(--border);
}
header .logo{font-size:15px; font-weight:600; letter-spacing:.3px}
header .logo span{color:var(--accent)}
header .file-label{
  color:var(--fg2); font-size:12px; overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; flex:1;
}
.btn{
  background:var(--bg3); color:var(--fg); border:1px solid var(--border);
  border-radius:6px; padding:6px 12px; cursor:pointer; font-size:12px;
  transition:background .15s;
}
.btn:hover{background:var(--hover)}
.btn.primary{background:var(--accent2); border-color:var(--accent2); color:#fff}
/* ---------- sidebar tree ---------- */
#sidebar{
  grid-area:sidebar; background:var(--bg2); border-right:1px solid var(--border);
  overflow-y:auto; padding:10px 6px;
}
#sidebar h3, #panel h3{
  font-size:11px; text-transform:uppercase; letter-spacing:1px;
  color:var(--fg2); padding:6px 10px 8px;
}
.tree ul{list-style:none; padding-left:14px}
.tree>ul{padding-left:2px}
.tnode{
  display:flex; align-items:center; gap:6px; padding:4px 8px;
  border-radius:6px; cursor:pointer; user-select:none; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.tnode:hover{background:var(--hover)}
.tnode.active{background:var(--active); color:var(--accent)}
.tnode .caret{width:10px; font-size:9px; color:var(--fg2); transition:transform .15s; flex-shrink:0}
.tnode .caret.open{transform:rotate(90deg)}
.tnode .ico{flex-shrink:0; width:16px; text-align:center}
.tnode .sz{margin-left:auto; color:var(--fg2); font-size:10px; padding-left:8px}
.tnode .fmt{
  font-size:9px; font-weight:600; padding:1px 5px; border-radius:4px;
  background:var(--bg3); color:var(--fg2); border:1px solid var(--border); flex-shrink:0;
}
.tnode .dot{width:9px; height:9px; border-radius:50%; flex-shrink:0; border:1px solid rgba(0,0,0,.3)}
.hidden{display:none}
/* ---------- canvas ---------- */
#canvas-wrap{grid-area:canvas; position:relative; background:var(--canvas)}
#canvas-wrap canvas{display:block}
#overlay{
  position:absolute; inset:0; display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:14px; background:rgba(0,0,0,.35); backdrop-filter:blur(2px);
  z-index:5; color:#fff;
}
#overlay.show{display:flex}
.spinner{
  width:38px; height:38px; border:3px solid rgba(255,255,255,.25);
  border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#empty-hint{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:8px; color:var(--fg2); pointer-events:none;
}
#empty-hint .big{font-size:38px; opacity:.5}
#hud{
  position:absolute; left:12px; bottom:10px; color:var(--fg2); font-size:11px;
  background:color-mix(in srgb, var(--bg2) 75%, transparent); padding:4px 10px;
  border-radius:6px; border:1px solid var(--border); pointer-events:none;
}
/* ---------- right panel ---------- */
#panel{
  grid-area:panel; background:var(--bg2); border-left:1px solid var(--border);
  overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:14px;
}
.card{background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:10px 12px}
.card h4{font-size:12px; margin-bottom:10px; color:var(--fg)}
.row{display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; gap:8px}
.row:last-child{margin-bottom:0}
.row label{color:var(--fg2); font-size:12px}
.row .val{color:var(--accent); font-size:11px; min-width:34px; text-align:right}
input[type=range]{flex:1; accent-color:var(--accent); height:4px}
select{
  background:var(--bg2); color:var(--fg); border:1px solid var(--border);
  border-radius:6px; padding:4px 6px; font-size:12px;
}
input[type=checkbox]{accent-color:var(--accent)}
.kv{display:grid; grid-template-columns:auto 1fr; gap:4px 12px; font-size:12px}
.kv .k{color:var(--fg2)}
.kv .v{text-align:right; font-variant-numeric:tabular-nums; word-break:break-all}
/* legend */
.legend-item{
  display:flex; align-items:center; gap:8px; padding:4px 6px; border-radius:6px;
  cursor:pointer; font-size:12px;
}
.legend-item:hover{background:var(--hover)}
.legend-item.off{opacity:.38}
.legend-item .dot{width:11px; height:11px; border-radius:3px; flex-shrink:0}
.legend-item .cnt{margin-left:auto; color:var(--fg2); font-size:11px; font-variant-numeric:tabular-nums}
.legend-item .nz{
  font-size:9px; color:var(--fg2); background:var(--bg2); border:1px solid var(--border);
  border-radius:4px; padding:0 4px;
}
.muted{color:var(--fg2); font-size:12px; text-align:center; padding:6px 0}
::-webkit-scrollbar{width:9px; height:9px}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:5px}
::-webkit-scrollbar-track{background:transparent}
</style>
<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<header>
  <div class="logo">◆ BIM <span>Point Cloud</span> Viewer</div>
  <div class="file-label" id="file-label">파일을 선택하세요</div>
  <button class="btn" id="btn-shot" title="현재 화면 PNG 저장">📷 캡처</button>
  <button class="btn" id="btn-fit" title="점군에 카메라 맞춤">⤢ 뷰 리셋</button>
  <button class="btn" id="btn-theme">🌙 다크</button>
</header>

<nav id="sidebar">
  <h3>Output 탐색기</h3>
  <div class="tree" id="tree"><div class="muted">불러오는 중…</div></div>
</nav>

<main id="canvas-wrap">
  <div id="empty-hint"><div class="big">☁</div><div>왼쪽 트리에서 점군 파일(las/laz/txt)을 클릭하세요</div></div>
  <div id="overlay"><div class="spinner"></div><div id="overlay-msg">로딩 중…</div></div>
  <div id="hud"></div>
</main>

<aside id="panel">
  <div class="card">
    <h4>⚙ 렌더링 설정</h4>
    <div class="row"><label>점 크기</label>
      <input type="range" id="pt-size" min="0.5" max="8" step="0.1" value="1.6">
      <span class="val" id="pt-size-v">1.6</span></div>
    <div class="row"><label>투명도</label>
      <input type="range" id="pt-alpha" min="0.05" max="1" step="0.05" value="1">
      <span class="val" id="pt-alpha-v">1.00</span></div>
    <div class="row"><label>색상 모드</label>
      <select id="color-mode">
        <option value="rgb">RGB (텍스처)</option>
        <option value="class">클래스 라벨</option>
        <option value="height">높이(Z)</option>
      </select></div>
    <div class="row"><label>최대 점수</label>
      <select id="max-pts">
        <option value="200000">20만</option>
        <option value="500000">50만</option>
        <option value="1000000">100만</option>
        <option value="2000000" selected>200만</option>
        <option value="5000000">500만</option>
      </select></div>
    <div class="row"><label>그리드</label><input type="checkbox" id="chk-grid" checked></div>
    <div class="row"><label>좌표축</label><input type="checkbox" id="chk-axes" checked></div>
  </div>

  <div class="card">
    <h4>ℹ 기본 정보</h4>
    <div class="kv" id="info-kv"><div class="muted" style="grid-column:1/3">-</div></div>
  </div>

  <div class="card">
    <h4>🏷 클래스 범례 <span style="font-weight:400;color:var(--fg2);font-size:10px">(클릭: 표시/숨김)</span></h4>
    <div id="legend"><div class="muted">-</div></div>
  </div>
</aside>

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

// ---------------- 상태 ----------------
const state = {
  header:null, positions:null, colors8:null, classes:null,
  hidden:new Set(), points:null, catByIndex:{}, activeNode:null,
};
const fmtN = n => n.toLocaleString('ko-KR');
const fmtB = b => b>1048576 ? (b/1048576).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB';
const $ = id => document.getElementById(id);

// ---------------- three.js 기본 ----------------
const wrap = $('canvas-wrap');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 5000);
camera.up.set(0,0,1);
camera.position.set(12,-12,8);
const renderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
wrap.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = .08;

let grid=null, axes=new THREE.AxesHelper(3);
scene.add(axes);

function canvasBg(){
  const t = document.documentElement.dataset.theme;
  scene.background = new THREE.Color(t==='dark' ? 0x0a0e14 : 0xe8ecf1);
}
canvasBg();

function resize(){
  const w=wrap.clientWidth, h=wrap.clientHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(wrap); resize();

(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera); })();

// ---------------- 색상 유틸 ----------------
const PALETTE = ['#4da3ff','#ff7b72','#7ee787','#ffcf60','#d2a8ff','#76e3ea',
                 '#f78bd0','#a8ff9e','#ffa657','#79c0ff','#e3b341','#ff9bce'];
function classColor(idx){
  const cat = state.catByIndex[idx];
  if (cat) return cat.color.map(c=>c/255);
  const h = new THREE.Color(PALETTE[idx % PALETTE.length]);
  return [h.r,h.g,h.b];
}
function turbo(t){ // 높이 컬러맵(간이 turbo)
  t = Math.min(1, Math.max(0, t));
  return [
    Math.min(1, Math.max(0, 34.61 + t*(1172.33 + t*(-10793.56 + t*(33300.12 + t*(-38394.49 + t*14825.05)))))/255),
    Math.min(1, Math.max(0, 23.31 + t*(557.33 + t*(1225.33 + t*(-3574.96 + t*(1073.77 + t*707.56)))))/255),
    Math.min(1, Math.max(0, 27.2 + t*(3211.1 + t*(-15327.97 + t*(27814.0 + t*(-22569.18 + t*6838.66)))))/255)
  ];
}

// ---------------- 지오메트리 빌드 ----------------
function buildCloud(){
  if (state.points){ scene.remove(state.points); state.points.geometry.dispose(); state.points.material.dispose(); state.points=null; }
  if (!state.header) return;

  const n = state.header.count;
  const useFilter = state.hidden.size > 0;
  let pos, col8, cls, m;
  if (useFilter){
    let cnt=0;
    for (let i=0;i<n;i++) if(!state.hidden.has(state.classes[i])) cnt++;
    pos = new Float32Array(cnt*3); col8 = new Uint8Array(cnt*3); cls = new Uint8Array(cnt);
    let j=0;
    for (let i=0;i<n;i++){
      if (state.hidden.has(state.classes[i])) continue;
      pos[j*3]=state.positions[i*3]; pos[j*3+1]=state.positions[i*3+1]; pos[j*3+2]=state.positions[i*3+2];
      col8[j*3]=state.colors8[i*3]; col8[j*3+1]=state.colors8[i*3+1]; col8[j*3+2]=state.colors8[i*3+2];
      cls[j]=state.classes[i]; j++;
    }
    m = cnt;
  } else { pos=state.positions; col8=state.colors8; cls=state.classes; m=n; }

  // 색상 계산
  const mode = $('color-mode').value;
  const colors = new Float32Array(m*3);
  const zmin = state.header.bbox_min[2], zmax = state.header.bbox_max[2];
  const zr = Math.max(1e-6, zmax-zmin);
  const ccache = {};
  for (let i=0;i<m;i++){
    let r,g,b;
    if (mode==='rgb'){ r=col8[i*3]/255; g=col8[i*3+1]/255; b=col8[i*3+2]/255; }
    else if (mode==='class'){
      const k=cls[i];
      const c = ccache[k] || (ccache[k]=classColor(k));
      r=c[0]; g=c[1]; b=c[2];
    } else {
      const c = turbo((pos[i*3+2]-zmin)/zr); r=c[0]; g=c[1]; b=c[2];
    }
    colors[i*3]=r; colors[i*3+1]=g; colors[i*3+2]=b;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  const mat = new THREE.PointsMaterial({
    size: parseFloat($('pt-size').value), sizeAttenuation:false, vertexColors:true,
    transparent:true, opacity: parseFloat($('pt-alpha').value), depthWrite: parseFloat($('pt-alpha').value)>0.95,
  });
  state.points = new THREE.Points(geo, mat);
  scene.add(state.points);
  $('hud').textContent = `표시 ${fmtN(m)} / 로드 ${fmtN(n)} / 원본 ${fmtN(state.header.total)} pts`;
}

function fitView(){
  if (!state.header) return;
  const mn=state.header.bbox_min, mx=state.header.bbox_max;
  const cx=(mn[0]+mx[0])/2, cy=(mn[1]+mx[1])/2, cz=(mn[2]+mx[2])/2;
  const diag = Math.hypot(mx[0]-mn[0], mx[1]-mn[1], mx[2]-mn[2]) || 10;
  controls.target.set(cx,cy,cz);
  camera.position.set(cx + diag*0.7, cy - diag*0.9, cz + diag*0.6);
  camera.near = diag/1000; camera.far = diag*50; camera.updateProjectionMatrix();
  if (grid){ scene.remove(grid); grid.geometry.dispose(); }
  const gsize = Math.ceil(diag*1.2/2)*2;
  grid = new THREE.GridHelper(gsize, Math.min(60,gsize), 0x3a4656, 0x252d3a);
  grid.rotation.x = Math.PI/2;
  grid.position.set(cx, cy, mn[2]);
  grid.visible = $('chk-grid').checked;
  scene.add(grid);
  axes.position.set(mn[0], mn[1], mn[2]);
  axes.scale.setScalar(diag*0.12);
}

// ---------------- 데이터 로드 ----------------
async function loadCloud(path, nodeEl){
  $('overlay').classList.add('show'); $('overlay-msg').textContent='다운로드 중…';
  $('empty-hint').style.display='none';
  try{
    const res = await fetch(`/api/points?path=${encodeURIComponent(path)}&max=${$('max-pts').value}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const buf = await res.arrayBuffer();
    $('overlay-msg').textContent='파싱 중…';
    const dv = new DataView(buf);
    const hlen = dv.getUint32(0,true);
    const header = JSON.parse(new TextDecoder().decode(new Uint8Array(buf,4,hlen)));
    let off = 4+hlen;
    const n = header.count;
    state.header = header;
    state.positions = new Float32Array(buf, off, n*3); off += n*12;
    state.colors8 = new Uint8Array(buf, off, n*3); off += n*3;
    state.classes = new Uint8Array(buf, off, n);
    state.hidden = new Set();

    if (state.activeNode) state.activeNode.classList.remove('active');
    if (nodeEl){ nodeEl.classList.add('active'); state.activeNode = nodeEl; }
    $('file-label').textContent = path;

    buildCloud(); fitView(); renderInfo(); renderLegend();
  }catch(e){
    alert('점군 로드 실패: '+e.message);
  }finally{
    $('overlay').classList.remove('show');
  }
}

// ---------------- 정보/범례 ----------------
function renderInfo(extra){
  const kv = $('info-kv'); kv.innerHTML='';
  const add=(k,v)=>{ kv.insertAdjacentHTML('beforeend',`<div class="k">${k}</div><div class="v">${v}</div>`); };
  if (!state.header){ kv.innerHTML='<div class="muted" style="grid-column:1/3">-</div>'; return; }
  const h = state.header;
  const dx=(h.bbox_max[0]-h.bbox_min[0]).toFixed(2), dy=(h.bbox_max[1]-h.bbox_min[1]).toFixed(2), dz=(h.bbox_max[2]-h.bbox_min[2]).toFixed(2);
  add('파일', h.name);
  add('형식', h.format.toUpperCase());
  add('용량', fmtB(h.size));
  add('원본 점수', fmtN(h.total));
  add('로드 점수', fmtN(h.count));
  add('크기(m)', `${dx} × ${dy} × ${dz}`);
  add('클래스 수', Object.keys(h.classes).length);
  if (extra) for (const [k,v] of extra) add(k,v);
}

function renderLegend(){
  const lg = $('legend'); lg.innerHTML='';
  if (!state.header){ lg.innerHTML='<div class="muted">-</div>'; return; }
  const entries = Object.entries(state.header.classes).sort((a,b)=>+a[0]-+b[0]);
  for (const [idxS, cnt] of entries){
    const idx=+idxS;
    const cat = state.catByIndex[idx];
    const c = classColor(idx).map(v=>Math.round(v*255));
    const div = document.createElement('div');
    div.className='legend-item'+(state.hidden.has(idx)?' off':'');
    div.innerHTML = `<span class="dot" style="background:rgb(${c})"></span>
      <span>${cat?cat.name:'class '+idx}</span>
      ${cat&&cat.noise?`<span class="nz" title="노이즈 수준">nz ${cat.noise}</span>`:''}
      <span class="cnt">${fmtN(cnt)}</span>`;
    div.onclick = ()=>{
      state.hidden.has(idx) ? state.hidden.delete(idx) : state.hidden.add(idx);
      div.classList.toggle('off');
      buildCloud();
    };
    lg.appendChild(div);
  }
}

// ---------------- 트리 ----------------
const ICONS = {model:'🏢', folder:'🗂️', cloud:{las:'☁️',laz:'☁️',txt:'📄'}};
function renderTree(nodes, parentUl){
  for (const nd of nodes){
    const li = document.createElement('li');
    const row = document.createElement('div'); row.className='tnode';
    if (nd.type==='cloud'){
      row.innerHTML = `<span class="caret"></span><span class="ico">${ICONS.cloud[nd.format]||'📄'}</span>
        <span>${nd.name}</span><span class="fmt">${nd.format}</span><span class="sz">${fmtB(nd.size)}</span>`;
      row.onclick = ()=>loadCloud(nd.path, row);
      li.appendChild(row);
    } else {
      const isClass = nd.type==='class';
      const cat = isClass ? Object.values(state.catByIndex).find(c=>c.name===nd.name) : null;
      const ico = isClass
        ? `<span class="dot" style="background:rgb(${cat?cat.color:'150,150,150'})"></span>`
        : `<span class="ico">${ICONS[nd.type]||'📁'}</span>`;
      row.innerHTML = `<span class="caret open">▶</span>${ico}<span><b>${nd.name}</b></span>`;
      const ul = document.createElement('ul');
      renderTree(nd.children||[], ul);
      row.onclick = ()=>{
        ul.classList.toggle('hidden');
        row.querySelector('.caret').classList.toggle('open');
        if (nd.labels) showLabels(nd.labels);
      };
      li.appendChild(row); li.appendChild(ul);
      if (nd.type==='class') { ul.classList.add('hidden'); row.querySelector('.caret').classList.remove('open'); }
    }
    parentUl.appendChild(li);
  }
}
async function showLabels(path){
  try{
    const res = await fetch(`/api/labels?path=${encodeURIComponent(path)}`);
    const lb = await res.json();
    renderInfo([['—','— train 라벨 —'],
      ['소스 IFC', lb.source_ifc||'-'],
      ['클래스 수', lb.num_classes],
      ['총 점수', fmtN(lb.total_points||0)],
      ['생성일', (lb.created||'').replace('T',' ')]]);
  }catch(e){}
}

async function init(){
  const cfg = await (await fetch('/api/config')).json();
  for (const c of cfg.categories) state.catByIndex[c.index]=c;
  const tree = await (await fetch('/api/tree')).json();
  const el = $('tree'); el.innerHTML='';
  if (!tree.length){ el.innerHTML='<div class="muted">output 폴더에 점군이 없습니다</div>'; return; }
  const ul = document.createElement('ul');
  renderTree(tree, ul); el.appendChild(ul);
  // 딥링크: ?load=<상대경로>&max=<점수> 로 바로 로드
  const qs = new URLSearchParams(location.search);
  const q = qs.get('load');
  if (qs.get('max')){
    const sel=$('max-pts'); const v=qs.get('max');
    if (![...sel.options].some(o=>o.value===v)){
      const o=document.createElement('option'); o.value=v; o.textContent=(+v).toLocaleString('ko-KR'); sel.appendChild(o);
    }
    sel.value=v;
  }
  if (q) loadCloud(q, null);
}
init();

// ---------------- UI 이벤트 ----------------
$('pt-size').oninput = e=>{ $('pt-size-v').textContent=(+e.target.value).toFixed(1);
  if(state.points) state.points.material.size=+e.target.value; };
$('pt-alpha').oninput = e=>{ const a=+e.target.value; $('pt-alpha-v').textContent=a.toFixed(2);
  if(state.points){ state.points.material.opacity=a; state.points.material.depthWrite=a>0.95; } };
$('color-mode').onchange = ()=>buildCloud();
$('max-pts').onchange = ()=>{ if(state.header) loadCloud(state.header.path, state.activeNode); };
$('chk-grid').onchange = e=>{ if(grid) grid.visible=e.target.checked; };
$('chk-axes').onchange = e=>{ axes.visible=e.target.checked; };
$('btn-fit').onclick = fitView;
$('btn-shot').onclick = ()=>{
  renderer.render(scene,camera);
  const a=document.createElement('a');
  a.download=(state.header?state.header.name:'viewer')+'.png';
  a.href=renderer.domElement.toDataURL('image/png'); a.click();
};
$('btn-theme').onclick = ()=>{
  const root=document.documentElement;
  const next = root.dataset.theme==='dark' ? 'light' : 'dark';
  root.dataset.theme=next;
  $('btn-theme').textContent = next==='dark' ? '🌙 다크' : '☀️ 라이트';
  canvasBg();
};
</script>
</body>
</html>
